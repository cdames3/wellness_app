services:
  - type: web
    runtime: node
    name: wellness-backend
    rootDir: backend-auth
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - backend-auth/**
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: ALLOW_DEMO_MODE
        value: false
      - key: SEED_DEMO_USERS
        value: false
      - key: ADMIN_NAME
        value: Wellness Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_MEMBERSHIP_NUMBER
        value: ADMIN-001
      - key: MAIL_FROM
        value: Wellness Center Studio <no-reply@example.com>
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: PORT
        value: 10000

  - type: web
    runtime: static
    name: wellness-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
