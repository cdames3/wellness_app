services:
  - type: web
    runtime: node
    name: wellness-backend
    rootDir: backend-auth
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: ALLOW_DEMO_MODE
        value: false
      - key: SEED_DEMO_USERS
        value: false
      - key: ADMIN_NAME
        value: Wellness Admin
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_MEMBERSHIP_NUMBER
        value: ADMIN-001
      - key: PORT
        value: 10000

  - type: web
    runtime: static
    name: wellness-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
